<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galería | Timbre Automático</title>
  <link rel="stylesheet" href="../css/styles3.css" />
  <style>
    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; margin-top: 2rem; }
    .gallery-item { position: relative; border-radius: 16px; overflow: hidden; border: 1px solid var(--border); aspect-ratio: 4/3; background: var(--bg-alt); cursor: pointer; transition: all .25s; }
    .gallery-item:hover { transform: scale(1.04); box-shadow: var(--shadow-lg); border-color: var(--primary); }
    .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
    .gallery-item.tall { aspect-ratio: 3/4; }
    .gallery-item.wide { grid-column: span 2; aspect-ratio: 16/8; }
    .gallery-item .ph { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: .6rem; color: var(--text-muted); font-size: .8rem; }
    .gallery-item .icon { font-size: 2.5rem; opacity: .3; }
    .filter-bar { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 2rem; }
    .filter-btn { padding: 0.5rem 1.2rem; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-family: var(--font-sans); font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all .2s; }
    .filter-btn.active, .filter-btn:hover { background: var(--primary); border-color: var(--primary); color: white; }
  </style>
</head>
<body>

  <script src="../js/nav-template.js"></script>

  <main>

    <div class="page-header">
      <div class="container">
        <p class="breadcrumb"><a href="../index.html">Inicio</a> / Galería</p>
        <span class="section-label">Registro fotográfico</span>
        <h1>Galería del Proyecto</h1>
        <p>Fotografías del proceso de construcción, montaje del circuito y pruebas del timbre automático.</p>
      </div>
    </div>

    <section>
      <div class="container">

        <div class="filter-bar">
          <button class="filter-btn active" onclick="filterGallery('all', this)">Todas</button>
          <button class="filter-btn" onclick="filterGallery('proceso', this)">Proceso</button>
          <button class="filter-btn" onclick="filterGallery('circuito', this)">Circuito</button>
          <button class="filter-btn" onclick="filterGallery('pruebas', this)">Pruebas</button>
        </div>

        <div class="gallery-grid" id="gallery">
 
          <div class="gallery-item wide" data-cat="proceso">
            <img src="../img/componentes.jpg" alt="Componentes"> 
          </div>

          <div class="gallery-item" data-cat="proceso">
            <img src="../img/capturafinal.jpg" alt="Proyecto"> 
          </div>

          <div class="gallery-item tall" data-cat="circuito">
           <img src="../img/circuito.jpg" alt="Circuito">  
          </div>

          <div class="gallery-item" data-cat="circuito">
             <img src="../img/circuito2.jpg" alt="circuito2">
          </div>

          <div class="gallery-item" data-cat="circuito">
             <img src="../img/utlcir.jpg" alt="circuito3">
          </div>

          <div class="gallery-item" data-cat="pruebas">
             <img src="../img/prueba-final.jpg" alt="prueba">
          </div>

          <div class="gallery-item wide" data-cat="pruebas">
             <img src="../img/prueba2.jpg" alt="VS">
          </div>

          <div class="gallery-item" data-cat="proceso">
              <img src="../img/ide-arduino.jpg" alt="VS"> 
          </div>

        </div>

      </div>
    </section>

  </main>

  <footer class="footer">
    <div class="footer-inner">
      <span class="footer-brand">🔔 Timbre Automático</span>
      <ul class="footer-links">
        <li><a href="../index.html">Inicio</a></li>
        <li><a href="desarrollo.html">Desarrollo</a></li>
        <li><a href="acerca.html">Acerca de</a></li>
      </ul>
      <span class="footer-copy">Emprendimiento e Innovación y Desarrollo de Paginas Web 2024–2026</span>
    </div>
  </footer>

  <script src="../js/main.js"></script>
  <script>
    function filterGallery(cat, btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('#gallery .gallery-item').forEach(item => {
        if (cat === 'all' || item.dataset.cat === cat) {
          item.style.display = '';
        } else {
          item.style.display = 'none';
        }
      });
    }
  </script>
</body>
</html>
